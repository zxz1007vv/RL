joint_names:
  - FL_hip_joint
  - FL_thigh_joint
  - FL_calf_joint
  - FL_wheel_joint
  - FR_hip_joint
  - FR_thigh_joint
  - FR_calf_joint
  - FR_wheel_joint
  - RL_hip_joint
  - RL_thigh_joint
  - RL_calf_joint
  - RL_wheel_joint
  - RR_hip_joint
  - RR_thigh_joint
  - RR_calf_joint
  - RR_wheel_joint

wheel_ids: [3, 7, 11, 15]

default_dof_pos: [0.00, 0.8, -1.5, 0.00]  
crouch_dof_pos:  [0.00, 0.4, -0.8, 0.00]   
# Fixed PD hold posture, between crouch and the RL nominal posture.
pd_hold_dof_pos: [0.00, 0.6, -1.15, 0.00]
pd_hold_p_gains: [30.0, 35.0, 35.0, 0.0]
pd_hold_d_gains: [1.5, 2.0, 2.0, 0.5]
pd_transition_time: 0.5

p_gains: [40.0, 40.0, 40.0, 0.0]
d_gains: [1.0, 1.0, 1.0, 0.5]


actions_scale: 0.25
vel_scale: 10.0
yaw_kp: 2.5

scale_factors:
  scale_lin_vel: 2.0
  scale_ang_vel: 0.25
  scale_dof_pos: 1.0
  scale_dof_vel: 0.05

sim_steps_per_loop: 4
timestep: 0.002

# keyboard: use W/S/A/D/Q/E
# gamepad: use left stick for vx/vy, right stick horizontal for yaw target
input:
 # source: "keyboard"
  source: "gamepad"
  gamepad:
    # Logitech F710: set the side switch to X mode. Prefer SDL's standard
    # Controller mapping; raw axis IDs below are only used as fallback.
    prefer_sdl_controller: true
    device_index: 0
    deadzone: 0.08
    max_vx: 1.0
    max_vy: 0.5
    max_yaw_rate: 1.0
    axis_left_x: 0
    axis_left_y: 1
    axis_right_x: 3
    reset_button: 0
