paths:
  scene_xml: "../resources/robots/zgwt/mjcf/scene.xml"
  policy_path: "../logs/ZGWT/exported/policies/policy7.9v2.pt"

base_body: "BASE_LINK"
base_pos: [0.0, 0.0, 0.55]
# Fixed PD hold pose used on startup and after pressing B.  It is deliberately
# independent of the RL nominal pose: this is the stable posture between prone
# and normal standing.
pd_transition_time: 0.5
pd_hold_p_gains: [60.0, 80.0, 80.0, 0.0]
pd_hold_d_gains: [2.0, 3.0, 3.0, 0.4]

joints:
  - name: FAR_ABAD_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 90.0
    kd: 1.0
  - name: FAR_HIP_JOINT
    default: 0.6
    crouch: 0.4
    pd_hold: 0.5
    kp: 120.0
    kd: 1.0
  - name: FAR_KNEE_JOINT
    default: -1.2
    crouch: -0.8
    pd_hold: -1.0
    kp: 120.0
    kd: 1.0
  - name: FAR_FOOT_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 60.0
    kd: 0.2
    wheel: true

  - name: FBL_ABAD_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 90.0
    kd: 1.0
  - name: FBL_HIP_JOINT
    default: 0.6
    crouch: 0.4
    pd_hold: 0.5
    kp: 120.0
    kd: 1.0
  - name: FBL_KNEE_JOINT
    default: -1.2
    crouch: -0.8
    pd_hold: -1.0
    kp: 120.0
    kd: 1.0
  - name: FBL_FOOT_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 60.0
    kd: 0.2
    wheel: true

  - name: RAR_ABAD_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 90.0
    kd: 1.0
  - name: RAR_HIP_JOINT
    default: -0.6
    crouch: -0.4
    pd_hold: -0.5
    kp: 120.0
    kd: 1.0
  - name: RAR_KNEE_JOINT
    default: 1.2
    crouch: 0.8
    pd_hold: 1.0
    kp: 120.0
    kd: 1.0
  - name: RAR_FOOT_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 60.0
    kd: 0.2
    wheel: true

  - name: RBL_ABAD_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 90.0
    kd: 1.0
  - name: RBL_HIP_JOINT
    default: -0.6
    crouch: -0.4
    pd_hold: -0.5
    kp: 120.0
    kd: 1.0
  - name: RBL_KNEE_JOINT
    default: 1.2
    crouch: 0.8
    pd_hold: 1.0
    kp: 120.0
    kd: 1.0
  - name: RBL_FOOT_JOINT
    default: 0.0
    crouch: 0.0
    pd_hold: 0.0
    kp: 60.0
    kd: 0.2
    wheel: true

actions_scale: 0.25
vel_scale: 10.0
wheel_control: "torque"

commands:
  # Match ZGWTRoughCfg.commands.heading_command = False:
  # [vx, vy, wz] are sent directly to the policy.
  mode: "yaw_rate"
  ranges:
    lin_vel_x: [-1.0, 1.0]
    lin_vel_y: [-0.6, 0.6]
    ang_vel_yaw: [-1.0, 1.0]
  # Used only when mode = "heading".
  yaw_kp: 2.5

scale_factors:
  scale_lin_vel: 2.0
  scale_ang_vel: 0.25
  scale_dof_pos: 1.0
  scale_dof_vel: 0.05

sim_steps_per_loop: 5
timestep: 0.002

input:
  source: "gamepad"
  gamepad:
    prefer_sdl_controller: true
    device_index: 0
    deadzone: 0.08
    yaw_mode: "yaw_rate"
    max_vx: 1.0
    max_vy: 0.6
    max_yaw_rate: 1.0
    axis_left_x: 0
    axis_left_y: 1
    axis_right_x: 3
    start_button: 0  # A
    stop_button: 1   # B
    reset_button: 2  # X
