# Reuse robot, joint, actuator, and scene definitions from the locomotion setup.
extends: "config_zgwt.yaml"

paths:
  policy_path: "../logs/ZGWT_DANCE/exported/policies/policy14.v1.pt"

# Startup: zero torque -> A folds the legs then stands -> B enters RL.
start_in_rl: false
startup_sequence:
  enabled: true
  leg_order: ["FAR", "FBL", "RAR", "RBL"]
  fold_duration: 2.0
  stand_duration: 2.0
  fold_abad_pos: [0.0, 0.0, 0.0, 0.0]
  fold_hip_pos: [1.4, 1.4, -1.4, -1.4]
  fold_knee_pos: [-2.4, -2.4, 2.4, 2.4]
  stand_abad_pos: [0.0, 0.0, 0.0, 0.0]
  stand_hip_pos: [0.6, 0.6, -0.6, -0.6]
  stand_knee_pos: [-1.2, -1.2, 1.2, 1.2]

input:
  source: "gamepad"
  gamepad:
    command_profile: "dance"
    start_request: "stand"
    stop_request: "rl"
    max_roll: 0.18
    max_pitch: 0.18
    height_center: 0.54
    height_range: 0.05
    min_height: 0.46
    max_height: 0.56
    roll_sign: -1.0
    pitch_sign: -1.0
    height_sign: -1.0
    axis_right_y: 4

commands:
  mode: "yaw_rate"
  policy_order:
    - lin_vel_x
    - lin_vel_y
    - ang_vel_yaw
    - body_roll
    - body_pitch
    - body_height
  scales: [2.0, 2.0, 0.25, 1.0, 1.0, 2.0]
  ranges:
    lin_vel_x: [0.0, 0.0]
    lin_vel_y: [0.0, 0.0]
    ang_vel_yaw: [0.0, 0.0]
    body_roll: [-0.18, 0.18]
    body_pitch: [-0.18, 0.18]
    body_height: [0.46, 0.56]
  pose_defaults:
    body_roll: 0.0
    body_pitch: 0.0
    body_height: 0.54
  dance_trajectory:
    # Set true to ignore pose sticks and run the automatic sine trajectory.
    enabled: false
    frequency: 0.25
    roll_amplitude: 0.15
    pitch_amplitude: 0.12
    height_center: 0.52
    height_amplitude: 0.04
